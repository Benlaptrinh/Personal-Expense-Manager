version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: pem_db
    environment:
      POSTGRES_DB: expense_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pem_redis
    ports:
      - '6379:6379'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pem_api
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/expense_manager
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: super-secret-change-me
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRE_MIN: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      RATE_LIMIT_LOGIN_ATTEMPTS: 5
      RATE_LIMIT_LOGIN_WINDOW_SECONDS: 300
      STATS_CACHE_TTL_SECONDS: 120
      CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
